<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공통 레이아웃 (헤더 · 사이드바) - 통합 사내 그룹웨어</title>
  <meta name="description" content="사내 그룹웨어 시스템 - 공통 레이아웃(헤더/사이드바) 미리보기">

  <!-- 구글 폰트 및 폰트어썸 아이콘 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==========================================
       공통 레이아웃 (헤더 + 사이드바)
       추후 타임리프 연동 시 각 페이지가 이 헤더/사이드바를 그대로
       가져다 쓰게 된다. 아직 연동 전이므로 메뉴의 href는 실제 페이지
       파일(main.html, calendar.html 등)을 직접 가리키도록 해 두었다.
       ========================================== -->
  <div class="app-wrapper" id="appWrapper">

    <header class="header">
      <div class="header-left">
        <a href="main.html" class="logo" style="text-decoration:none;">
          <div class="logo-box"><i class="fa-solid fa-cubes"></i></div>
          <span style="margin-left: 0.5rem;">GROUPWARE</span>
        </a>
      </div>

      <div class="header-right">
        <a class="icon-btn" href="chat.html" title="실시간 채팅" style="text-decoration:none;">
          <i class="fa-solid fa-comment-dots"></i>
          <span class="badge" id="headerChatBadge">2</span>
        </a>
        <a class="user-dropdown" href="mypage.html" style="text-decoration:none;">
          <div class="user-avatar" id="headerAvatar">홍</div>
          <div class="user-details">
            <span class="user-name-text" id="headerName">홍길동</span>
            <span class="user-role-text" id="headerDept">개발팀 · 사원</span>
          </div>
        </a>
        <a class="icon-btn" href="login.html" title="로그아웃" style="color: var(--color-danger); border-color: rgba(248,113,113,0.2); text-decoration:none;">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      </div>
    </header>

    <div class="main-body" id="mainBody">

      <aside class="sidebar">
        <ul class="sidebar-menu">
          <li class="sidebar-item" id="menu-dashboard"><a href="main.html"><i class="fa-solid fa-chart-line"></i> 대시보드</a></li>

          <li class="sidebar-group-label">업무</li>
          <li class="sidebar-item sub" id="menu-calendar"><a href="calendar.html"><i class="fa-solid fa-calendar-days"></i> 일정 캘린더</a></li>
          <li class="sidebar-item sub" id="menu-approval"><a href="approval.html"><i class="fa-solid fa-signature"></i> 전자결재</a></li>
          <li class="sidebar-item sub" id="menu-notice"><a href="notice.html"><i class="fa-solid fa-bullhorn"></i> 공지사항</a></li>
          <li class="sidebar-item sub" id="menu-archive"><a href="archive.html"><i class="fa-solid fa-file-shield"></i> 자료실</a></li>

          <li class="sidebar-group-label">조직 · 소통</li>
          <li class="sidebar-item sub" id="menu-org"><a href="org.html"><i class="fa-solid fa-sitemap"></i> 조직도</a></li>
          <li class="sidebar-item sub" id="menu-chat"><a href="chat.html"><i class="fa-solid fa-comment-dots"></i> 실시간 채팅</a></li>

          <li class="sidebar-group-label">근태관리</li>
          <li class="sidebar-item sub" id="menu-attendance"><a href="attendance.html"><i class="fa-solid fa-clock"></i> 출결 현황</a></li>

          <li class="sidebar-item" id="menu-mypage"><a href="mypage.html"><i class="fa-solid fa-user-gear"></i> 마이페이지</a></li>

          <!-- 관리자 전용 메뉴 - 실제 서비스에서는 로그인한 사용자의 role이 admin일 때만 노출된다 -->
          <li class="sidebar-group-label" id="adminGroupLabel">관리자</li>
          <li class="sidebar-item sub" id="menu-admin"><a href="admin.html"><i class="fa-solid fa-gears"></i> 계정·인사정보 관리</a></li>
          <li class="sidebar-item sub" id="menu-adminAttendance"><a href="admin-attendance.html"><i class="fa-solid fa-user-clock"></i> 직원 출결 관리</a></li>
        </ul>
      </aside>

      <main class="view-content">
        <!-- 각 페이지의 실제 콘텐츠가 들어가는 영역 (레이아웃 미리보기용 placeholder) -->
        <div class="card" style="display:flex; align-items:center; justify-content:center; min-height:300px; color:var(--text-muted);">
          이 영역에 각 페이지의 콘텐츠가 들어갑니다.
        </div>
      </main>

    </div>

</html>
